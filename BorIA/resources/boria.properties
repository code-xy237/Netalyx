# ─────────────────────────────────────────────────────────────────────
# BorIA — Fichier de configuration principal
# Chemin : resources/boria.properties
# ─────────────────────────────────────────────────────────────────────

# Identité du bot
bot.name=BorIA

# ── Réseau de neurones (Encog) ────────────────────────────────────────
# Nombre maximum d'itérations d'entraînement
nn.maxIterations=10000

# Seuil d'erreur cible (entraînement s'arrête en dessous)
nn.targetError=0.001

# ── NLP (Apache OpenNLP) ──────────────────────────────────────────────
# Chemin vers le modèle de détection de phrases
# Téléchargeable sur : https://opennlp.apache.org/models.html
nlp.modelPath=resources/models/en-sent.bin

# ── Chatbot AIML (Program AB) ─────────────────────────────────────────
# Dossier racine contenant le sous-dossier aiml/
aiml.path=resources

# ── Vision (OpenCV) ───────────────────────────────────────────────────
# Les bibliothèques natives sont chargées automatiquement via System.loadLibrary
# Assurez-vous que le dossier contenant .dll/.so/.dylib est dans java.library.path

# ── Journalisation ────────────────────────────────────────────────────
# Active les messages de débogage (true/false)
debug=false
